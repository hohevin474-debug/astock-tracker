name: A股短线跟踪

on:
  schedule:
    # 每15分钟触发一次（北京时间 09:00-15:15，即 UTC 01:00-07:15）
    # 只在周一至周五运行
    # 由 Python 脚本判断是否到了推送时间 + 防重复
    - cron: '*/15 1-7 * * 1-5'
    # 周末也触发一次用来测试（北京时间周六周日 09:00-15:00）
    - cron: '*/15 1-7 * * 6,0'
  workflow_dispatch:
    inputs:
      mode:
        description: '报告类型'
        required: true
        type: choice
        options:
          - auto
          - pre_market
          - intraday_1
          - midday
          - intraday_3
          - close
          - track
          - test

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests pyyaml pandas numpy
      
      - name: Run A-stock tracker
        env:
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ] || [ "$MODE" = "auto" ]; then
            python3 main.py auto
          else
            python3 main.py "$MODE"
          fi

      - name: Commit sent records (防重复)
        if: always()
        run: |
          git config user.name "A股跟踪机器人"
          git config user.email "bot@astock-tracker.local"
          git add .sent_today.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📝 更新推送记录 [skip ci]"
            git push
          fi
